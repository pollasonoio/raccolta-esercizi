<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Raccolta Esercizi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f6a37">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --accent:#0f6a37;
    --accent-dark:#0a4d28;
    --accent-light:#e6f2ea;
    --accent-pale:#f2f8f4;
    --bg:#f6f9f7;
    --panel:#ffffff;
    --border:#e2e5e8;
    --text:#1f2933;
    --text-muted:#697586;
    --radius:10px;
    --shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  /* ---------- HEADER ---------- */
  header{
    background:var(--panel);
    border-bottom:1px solid var(--border);
    padding:10px 18px;
    display:flex;
    align-items:center;
    gap:16px;
    flex-shrink:0;
    z-index:20;
  }
  header h1{
    font-size:17px;
    margin:0;
    white-space:nowrap;
    color:var(--accent-dark);
    font-weight:700;
  }
  .search-wrap{
    flex:1;
    max-width:520px;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    padding:9px 14px 9px 34px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:14px;
    background:var(--bg);
  }
  .search-wrap input:focus{outline:2px solid var(--accent); outline-offset:-1px; background:#fff;}
  .search-wrap svg{
    position:absolute; left:10px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; color:var(--text-muted);
  }
  .header-spacer{flex:1;}
  .btn{
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--text);
    padding:9px 14px;
    border-radius:8px;
    font-size:13.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:600;
    white-space:nowrap;
  }
  .btn:hover{background:var(--bg);}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn.primary:hover{background:var(--accent-dark);}
  .btn.danger{color:#b42318;}
  .btn svg{width:15px;height:15px;}
  .badge-count{
    background:var(--accent);
    color:#fff;
    border-radius:999px;
    font-size:11px;
    padding:1px 7px;
    font-weight:700;
  }

  /* ---------- LAYOUT ---------- */
  .layout{flex:1; display:flex; min-height:0;}
  aside.tree-panel{
    width:270px;
    flex-shrink:0;
    background:var(--panel);
    border-right:1px solid var(--border);
    overflow-y:auto;
    padding:14px 8px 40px;
  }
  main.content{
    flex:1;
    overflow-y:auto;
    padding:18px 22px 60px;
    min-width:0;
  }

  /* ---------- TREE ---------- */
  .tree-node{user-select:none;}
  .tree-row{
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 8px;
    border-radius:7px;
    cursor:pointer;
    font-size:13.5px;
    color:var(--text);
  }
  .tree-row:hover{background:var(--bg);}
  .tree-row.active{background:var(--accent-light); color:var(--accent-dark); font-weight:700;}
  .tree-row .caret{
    width:14px; height:14px; flex-shrink:0; color:var(--text-muted);
    transition:transform .12s;
  }
  .tree-row .caret.collapsed{transform:rotate(-90deg);}
  .tree-row .caret.hidden-caret{visibility:hidden;}
  .tree-row .label{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .tree-row .cnt{font-size:11px; color:var(--text-muted); font-weight:600;}
  .tree-children{margin-left:16px; display:block;}
  .tree-children.collapsed{display:none;}
  .tree-root-label{
    font-size:11px; text-transform:uppercase; letter-spacing:.04em;
    color:var(--text-muted); padding:10px 8px 4px; font-weight:700;
  }

  /* ---------- GRID ---------- */
  .content-header{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:14px; gap:10px; flex-wrap:wrap;
  }
  .content-header h2{font-size:18px; margin:0;}
  .content-header .sub{font-size:13px; color:var(--text-muted);}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px,1fr));
    gap:14px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    cursor:pointer;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    position:relative;
    transition:transform .08s, box-shadow .08s;
  }
  .card:hover{transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,.10);}
  .card .thumb{
    width:100%; aspect-ratio:4/3; background:#eef1f3;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .card .thumb img{width:100%; height:100%; object-fit:cover;}
  .card .body{padding:10px 12px 12px;}
  .card .nome{font-size:13.5px; font-weight:700; line-height:1.3; margin-bottom:3px;}
  .card .descr{font-size:12px; color:var(--text-muted); line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:16px;}
  .card .quant{
    margin-top:6px; font-size:11px; color:var(--accent-dark); font-weight:700;
  }
  .star-btn{
    position:absolute; top:8px; right:8px;
    width:30px; height:30px; border-radius:999px;
    background:rgba(255,255,255,.92);
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index:2;
  }
  .star-btn svg{width:16px;height:16px; color:var(--text-muted);}
  .star-btn.active{background:var(--accent); border-color:var(--accent);}
  .star-btn.active svg{color:#fff;}
  .no-results{color:var(--text-muted); padding:40px 0; text-align:center; font-size:14px;}

  /* ---------- MODAL ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,25,30,.55);
    display:none; align-items:center; justify-content:center; z-index:100; padding:24px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:#fff; border-radius:14px; max-width:760px; width:100%;
    max-height:88vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3);
    position:relative;
  }
  .modal .close-x{
    position:absolute; top:12px; right:12px; width:32px; height:32px; border-radius:999px;
    background:#fff; border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center;
    z-index:3;
  }
  .modal .modal-img{width:100%; max-height:46vh; object-fit:contain; background:#111318; display:block;}
  .modal .modal-body{padding:20px 24px 26px;}
  .modal .crumbs{font-size:12px; color:var(--text-muted); margin-bottom:6px;}
  .field-label{
    display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
    color:var(--accent-dark); margin:0 0 5px;
  }
  .edit-nome{
    width:100%; padding:8px 10px; margin-bottom:16px; border:1px solid var(--border); border-radius:8px;
    font-size:20px; font-weight:700; color:var(--text); font-family:inherit;
    background:var(--accent-pale);
  }
  .edit-nome:focus{outline:2px solid var(--accent); outline-offset:-1px; background:#fff;}
  .edit-quant{
    width:100%; max-width:260px; padding:8px 10px; border:1px solid var(--border); border-radius:7px;
    font-size:13.5px; font-family:inherit; font-weight:700; color:var(--accent-dark);
    background:var(--accent-pale); margin-bottom:16px;
  }
  .edit-quant:focus, .edit-descr:focus{outline:2px solid var(--accent); outline-offset:-1px; background:#fff;}
  .edit-descr{
    width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px;
    font-size:14.5px; line-height:1.55; color:#334; font-family:inherit; resize:vertical;
    background:var(--accent-pale);
  }
  .edit-status{font-size:12px; color:var(--accent-dark); min-height:16px; margin-top:6px; font-weight:600;}
  .modal .modal-actions{margin-top:14px; display:flex; gap:10px;}
  .nav-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:36px; height:36px; border-radius:999px; background:rgba(255,255,255,.85);
    border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:3;
  }
  .nav-arrow.prev{left:10px;}
  .nav-arrow.next{right:10px;}

  /* ---------- SCHEDA DRAWER ---------- */
  .drawer-overlay{
    position:fixed; inset:0; background:rgba(20,25,30,.35); display:none; z-index:90;
  }
  .drawer-overlay.open{display:block;}
  .drawer{
    position:fixed; top:0; right:-420px; width:400px; max-width:92vw; height:100vh;
    background:#fff; box-shadow:-6px 0 24px rgba(0,0,0,.15);
    z-index:95; transition:right .18s ease; display:flex; flex-direction:column;
  }
  .drawer.open{right:0;}
  .drawer-head{
    padding:16px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .drawer-head h3{margin:0; font-size:16px;}
  .drawer-fields{padding:14px 18px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:8px;}
  .drawer-fields label{font-size:11.5px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.03em;}
  .drawer-fields input, .drawer-fields textarea{
    width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:7px; font-size:13.5px; font-family:inherit;
  }
  .drawer-list{flex:1; overflow-y:auto; padding:10px 14px;}
  .drawer-item{
    display:flex; gap:10px; align-items:center; padding:8px; border-radius:8px;
  }
  .drawer-item:hover{background:var(--bg);}
  .drawer-item img{width:44px; height:44px; object-fit:cover; border-radius:6px; flex-shrink:0; background:#eee;}
  .drawer-item .di-name{font-size:13px; font-weight:600; flex:1; line-height:1.3;}
  .drawer-item .di-remove{
    width:24px; height:24px; border-radius:999px; border:none; background:transparent; cursor:pointer;
    color:var(--text-muted); display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .drawer-item .di-remove:hover{background:#fde8e6; color:#b42318;}
  .drawer-empty{color:var(--text-muted); font-size:13px; text-align:center; padding:30px 10px;}
  .drawer-foot{padding:14px 18px; border-top:1px solid var(--border); display:flex; gap:8px;}
  .drawer-foot .btn{flex:1; justify-content:center;}
  .drawer-foot-col{flex-direction:column;}
  .drawer-foot-row{display:flex; gap:8px;}
  .save-status{font-size:12px; color:var(--accent-dark); min-height:16px; font-weight:600; text-align:center;}

  /* ---------- CONTENUTO SCHEDA (usato sia nell'anteprima a schermo che in stampa) ---------- */
  .print-head{border-bottom:2px solid var(--accent); padding-bottom:10px; margin-bottom:16px;}
  .print-head h1{font-size:19px; margin:0 0 6px; color:var(--accent-dark);}
  .print-meta{font-size:13px; color:#333; display:flex; gap:22px;}
  .print-note{margin-top:8px; font-size:12.5px; color:#333; white-space:pre-line;}
  .print-item{
    display:flex; gap:14px; padding:12px 0; border-bottom:1px solid #ddd;
    break-inside:avoid;
  }
  .print-item img{max-width:110px; max-height:110px; width:auto; height:auto; border-radius:6px; flex-shrink:0; display:block; align-self:flex-start;}
  .print-item h4{margin:0 0 4px; font-size:14px;}
  .print-item .pq{font-size:12px; font-weight:700; color:var(--accent-dark); margin-bottom:3px;}
  .print-item p{margin:0; font-size:12px; color:#333; line-height:1.4;}
  .print-item .pnotes{margin-top:6px; font-size:11.5px; color:#888; border-top:1px dashed #ccc; padding-top:4px;}

  /* ---------- FOGLI A4 (usati sia nell'anteprima a schermo, sia in stampa,
     sia nel file HTML che si scarica) ----------
     Ogni "foglio" e' un div fisso 21cm x 29.7cm con il proprio padding
     interno (1cm sopra/sotto, 2cm ai lati, come i margini della carta
     intestata originale): intestazione in cima, elenco esercizi nel mezzo,
     piede pagina in fondo. Se gli esercizi non entrano in un foglio, lo
     script JS (buildA4Sheets) ne genera altri, tutti nello stesso formato:
     cosi' la scheda e' SEMPRE in formato A4, sia a schermo che in stampa
     che nel file scaricato, indipendentemente da quanti esercizi contiene. */
  .a4-sheet{
    width:21cm; height:29.7cm; box-sizing:border-box;
    padding:1cm 2cm 1cm 2cm;
    margin:0 auto 24px; background:#fff;
    box-shadow:0 8px 30px rgba(0,0,0,.28);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .a4-sheet .a4-header{flex-shrink:0; width:100%; display:block; margin-bottom:0.5cm;}
  .a4-sheet .a4-footer{flex-shrink:0; width:100%; display:block; margin-top:0.5cm;}
  .a4-sheet .a4-body{flex:1 1 auto; overflow:hidden;}

  /* ---------- ANTEPRIMA A SCHERMO ---------- */
  .preview-overlay{
    position:fixed; inset:0; background:rgba(15,20,18,.65); z-index:200;
    display:none; flex-direction:column;
  }
  .preview-overlay.open{display:flex;}
  .preview-toolbar{
    flex-shrink:0; background:var(--accent-dark); color:#fff; padding:12px 22px;
    display:flex; align-items:center; justify-content:space-between; gap:14px;
  }
  .preview-toolbar-title{font-weight:700; font-size:15px;}
  .preview-toolbar-actions{display:flex; gap:10px;}
  .preview-toolbar .btn.primary{background:#fff; color:var(--accent-dark); border-color:#fff;}
  .preview-toolbar .btn.primary:hover{background:var(--accent-light);}
  .preview-toolbar .btn.ghost{background:transparent; color:#fff; border-color:rgba(255,255,255,.5);}
  .preview-toolbar .btn.ghost:hover{background:rgba(255,255,255,.12);}
  .preview-scroll{flex:1; overflow-y:auto; padding:30px 16px;}

  /* ---------- STAMPA (carta intestata Centro di medicina) ----------
     #printPages contiene gli stessi .a4-sheet mostrati in anteprima: essendo
     gia' dimensionati esattamente come un foglio A4 (col proprio padding
     interno), @page non deve aggiungere altri margini (altrimenti il foglio
     supererebbe le dimensioni reali della pagina). Un foglio per pagina
     stampata, in ordine, tramite break-after: page. */
  #printPages{display:none;}
  @page{
    size: A4;
    margin: 0;
  }
  @media print{
    body *{visibility:hidden;}
    #printPages, #printPages *{visibility:visible;}
    #printPages{
      display:block; position:absolute; top:0; left:0; width:100%;
    }
    #printPages .a4-sheet{
      box-shadow:none; margin:0; break-after:page; page-break-after:always;
    }
    #printPages .a4-sheet:last-child{break-after:auto; page-break-after:auto;}
  }

  ::-webkit-scrollbar{width:9px; height:9px;}
  ::-webkit-scrollbar-thumb{background:#d3d8dc; border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>

<script>
  // Registra il service worker per il funzionamento offline. Se la pagina
  // e' aperta da file:// (senza hosting) il browser blocca i service worker:
  // l'app funziona comunque, semplicemente resta legata a quella cartella.
  if("serviceWorker" in navigator && (location.protocol==="http:"||location.protocol==="https:")){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(err){
        console.warn("Registrazione service worker fallita:", err);
      });
    });
  }
</script>
<script>
(function(){
  "use strict";

  // ---------- STATE ----------
  var state = {
    area: null,      // area selezionata nell'albero (o null = tutte)
    path: [],         // percorso sottocartella selezionato
    query: "",
    selected: loadSelected(),   // Set di id in scheda
    modalList: [],     // lista id correnti nel modal (per navigazione prev/next)
    modalIndex: -1
  };

  function loadSelected(){
    try{
      var raw = localStorage.getItem("raccolta_esercizi_scheda");
      if(raw) return new Set(JSON.parse(raw));
    }catch(e){}
    return new Set();
  }
  function saveSelected(){
    try{ localStorage.setItem("raccolta_esercizi_scheda", JSON.stringify(Array.from(state.selected))); }catch(e){}
  }
  function loadField(key, def){
    try{ var v = localStorage.getItem(key); return v!==null ? v : def; }catch(e){ return def; }
  }
  function saveField(key, val){
    try{ localStorage.setItem(key, val); }catch(e){}
  }

  var byId = {};
  EXERCISES.forEach(function(e){ byId[e.id] = e; });

  // ---------- MODIFICHE MANUALI (descrizione / quantita) ----------
  // Le modifiche fatte dall'utente vengono salvate nel browser (localStorage)
  // sopra ai dati originali, cosi' restano anche riaprendo il file. Il testo
  // originale (arrivato dall'archivio schede pazienti) resta sempre recuperabile
  // con "Ripristina originale".
  var ORIGINALS = {};
  EXERCISES.forEach(function(e){
    ORIGINALS[e.id] = {nome: e.nome, descrizione: e.descrizione, quantita: e.quantita};
  });

  function loadOverrides(){
    try{
      var raw = localStorage.getItem("raccolta_esercizi_overrides");
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return {};
  }
  function saveOverrides(overrides){
    try{ localStorage.setItem("raccolta_esercizi_overrides", JSON.stringify(overrides)); }catch(e){}
  }
  var OVERRIDES = loadOverrides();
  // applica subito le modifiche salvate ai dati in memoria
  Object.keys(OVERRIDES).forEach(function(id){
    if(byId[id]){
      if(typeof OVERRIDES[id].nome === "string") byId[id].nome = OVERRIDES[id].nome;
      if(typeof OVERRIDES[id].descrizione === "string") byId[id].descrizione = OVERRIDES[id].descrizione;
      if(typeof OVERRIDES[id].quantita === "string") byId[id].quantita = OVERRIDES[id].quantita;
    }
  });

  function setOverride(id, field, value){
    if(!OVERRIDES[id]) OVERRIDES[id] = {};
    OVERRIDES[id][field] = value;
    byId[id][field] = value;
    saveOverrides(OVERRIDES);
  }
  function hasOverride(id){
    return !!OVERRIDES[id] && (typeof OVERRIDES[id].nome === "string" || typeof OVERRIDES[id].descrizione === "string" || typeof OVERRIDES[id].quantita === "string");
  }
  function resetOverride(id){
    delete OVERRIDES[id];
    saveOverrides(OVERRIDES);
    var orig = ORIGINALS[id];
    if(orig){
      byId[id].nome = orig.nome;
      byId[id].descrizione = orig.descrizione;
      byId[id].quantita = orig.quantita;
    }
  }

  function normalize(s){
    return (s||"").toLowerCase().normalize("NFKD").replace(/[̀-ͯ]/g,"");
  }

  // ---------- ALBERO ----------
  function buildTree(){
    var tree = {};
    EXERCISES.forEach(function(e){
      if(!tree[e.area]) tree[e.area] = {count:0, children:{}};
      tree[e.area].count++;
      var node = tree[e.area];
      e.path.forEach(function(seg){
        if(!node.children[seg]) node.children[seg] = {count:0, children:{}};
        node.children[seg].count++;
        node = node.children[seg];
      });
    });
    return tree;
  }
  var TREE = buildTree();

  function isActiveNode(area, path){
    if(state.area !== area) return false;
    if(state.path.length !== path.length) return false;
    for(var i=0;i<path.length;i++){ if(state.path[i]!==path[i]) return false; }
    return true;
  }

  function renderTree(){
    var panel = document.getElementById("treePanel");
    panel.innerHTML = "";

    var allRow = document.createElement("div");
    allRow.className = "tree-row" + (state.area===null ? " active":"");
    allRow.innerHTML = '<span class="caret hidden-caret"></span><span class="label">Tutti gli esercizi</span><span class="cnt">'+EXERCISES.length+'</span>';
    allRow.onclick = function(){ state.area=null; state.path=[]; render(); };
    panel.appendChild(allRow);

    var rootLabel = document.createElement("div");
    rootLabel.className = "tree-root-label";
    rootLabel.textContent = "Distretti";
    panel.appendChild(rootLabel);

    Object.keys(TREE).forEach(function(area){
      panel.appendChild(buildNode(area, TREE[area], area, [], 0));
    });
  }

  function buildNode(label, node, area, path, depth){
    var wrap = document.createElement("div");
    wrap.className = "tree-node";

    var hasChildren = Object.keys(node.children).length > 0;
    var row = document.createElement("div");
    row.className = "tree-row" + (isActiveNode(area, path) ? " active":"");
    row.style.paddingLeft = (8 + depth*2) + "px";

    var caretSpan = '<span class="caret'+(hasChildren?"":" hidden-caret")+'" data-caret="1"></span>';
    row.innerHTML = caretSpan + '<span class="label"></span><span class="cnt">'+node.count+'</span>';
    row.querySelector(".label").textContent = label;
    if(hasChildren){
      row.querySelector(".caret").innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>';
    }

    var childWrap = document.createElement("div");
    childWrap.className = "tree-children";

    row.onclick = function(ev){
      state.area = area;
      state.path = path;
      render();
    };

    if(hasChildren){
      row.querySelector(".caret").addEventListener("click", function(ev){
        ev.stopPropagation();
        childWrap.classList.toggle("collapsed");
        this.classList.toggle("collapsed");
      });
    }

    wrap.appendChild(row);
    wrap.appendChild(childWrap);

    Object.keys(node.children).forEach(function(child){
      childWrap.appendChild(buildNode(child, node.children[child], area, path.concat([child]), depth+1));
    });

    return wrap;
  }

  // ---------- FILTRO ----------
  function pathMatches(e){
    if(state.area === null) return true;
    if(e.area !== state.area) return false;
    for(var i=0;i<state.path.length;i++){
      if(e.path[i] !== state.path[i]) return false;
    }
    return true;
  }
  function queryMatches(e){
    if(!state.query) return true;
    var q = normalize(state.query);
    return normalize(e.nome).indexOf(q)>=0 || normalize(e.descrizione).indexOf(q)>=0;
  }
  function getFiltered(){
    return EXERCISES.filter(function(e){ return pathMatches(e) && queryMatches(e); });
  }

  function starSVG(active){

  // ---------- FOGLI A4 (anteprima, stampa e file scaricato) ----------
  // Le proporzioni dell'intestazione e del piede pagina (altezza/larghezza)
  // vengono dalle immagini PNG originali della carta intestata: servono per
  // calcolare quanto spazio occupano su un foglio, senza dover attendere il
  // caricamento asincrono dell'immagine per fare i calcoli.
  var LH_HEADER_RATIO = 0.0959;
  var LH_FOOTER_RATIO = 0.0690;

  var _cmPx = null;
  function cmToPx(cm){
    if(_cmPx === null){
      var probe = document.createElement("div");
      probe.style.cssText = "position:absolute; visibility:hidden; height:0; width:100cm;";
      document.body.appendChild(probe);
      _cmPx = probe.getBoundingClientRect().width / 100;
      document.body.removeChild(probe);
      if(!_cmPx) _cmPx = 37.7952755906; // fallback teorico a 96dpi
    }
    return cm * _cmPx;
  }

  function buildItemHtml(imgSrc, nome, quantita, descrizione){
    return '<div class="print-item">' +
      (imgSrc ? '<img src="'+escapeHtml(imgSrc)+'" alt="">' : "") +
      '<div><h4>'+escapeHtml(nome)+'</h4>' +
      (quantita ? '<div class="pq">'+escapeHtml(quantita)+'</div>' : "") +
      '<p>'+escapeHtml(descrizione || "")+'</p>' +
      '<div class="pnotes">Note: ______________________________________________</div>' +
      '</div></div>';
  }

  function buildTitleHtml(paziente, dataVal, note){
    return '<div class="print-head"><h1>Scheda esercizi</h1><div class="print-meta">' +
      (paziente ? '<span>Paziente: '+escapeHtml(paziente)+'</span>' : '') +
      '<span>Data: '+escapeHtml(dataVal)+'</span></div>' +
      (note ? '<div class="print-note">'+escapeHtml(note)+'</div>' : '') +
      '</div>';
  }

  // Suddivide intestazione + esercizi in uno o piu' fogli A4 (.a4-sheet) e li
  // disegna dentro "container". Ogni foglio ha dimensione fissa 21x29.7cm:
  // se gli esercizi non entrano in uno, se ne genera un altro identico,
  // cosi' la scheda resta sempre in formato A4 a prescindere da quanti
  // esercizi contiene. items = [{imgSrc, nome, quantita, descrizione}, ...].
  function buildA4Sheets(container, headerSrc, footerSrc, paziente, dataVal, note, items){
    container.innerHTML = "";

    var contentWCm = 21 - 2*2; // 17cm: larghezza foglio meno margini laterali (2cm ciascuno)
    var contentWPx = cmToPx(contentWCm);
    var pageInnerHPx = cmToPx(29.7 - 2*1); // altezza utile: meno margini sopra/sotto (1cm ciascuno)
    var headerHPx = cmToPx(contentWCm * LH_HEADER_RATIO) + cmToPx(0.5);
    var footerHPx = cmToPx(contentWCm * LH_FOOTER_RATIO) + cmToPx(0.5);
    // piccolo margine di sicurezza (evita che un calcolo leggermente ottimistico
    // faccia traboccare l'ultimo esercizio fuori dal foglio)
    var avail = pageInnerHPx - headerHPx - footerHPx - cmToPx(0.4);

    // "probe" invisibile per misurare l'altezza reale del titolo e di ogni esercizio
    var probe = document.createElement("div");
    probe.style.cssText = "position:absolute; left:-99999px; top:0; width:"+contentWPx+"px; visibility:hidden;";
    document.body.appendChild(probe);
    function measure(html){
      var d = document.createElement("div");
      d.innerHTML = html;
      probe.appendChild(d);
      var h = d.getBoundingClientRect().height;
      probe.removeChild(d);
      return h;
    }

    var titleHtml = buildTitleHtml(paziente, dataVal, note);
    var titleH = measure(titleHtml);
    var itemHtmls = items.map(function(it){ return buildItemHtml(it.imgSrc, it.nome, it.quantita, it.descrizione); });
    var itemHeights = itemHtmls.map(measure);

    document.body.removeChild(probe);

    var pages = [];
    var current = [];
    var isFirstPage = true;
    var used = titleH;
    for(var i=0;i<itemHtmls.length;i++){
      var h = itemHeights[i];
      if(current.length > 0 && (used + h) > avail){
        pages.push({items: current, isFirst: isFirstPage});
        current = [];
        isFirstPage = false;
        used = 0;
      }
      current.push(i);
      used += h;
    }
    pages.push({items: current, isFirst: isFirstPage});

    pages.forEach(function(pg){
      var sheet = document.createElement("div");
      sheet.className = "a4-sheet";

      var headerImg = document.createElement("img");
      headerImg.className = "a4-header";
      headerImg.src = headerSrc;
      headerImg.alt = "Centro di medicina";
      sheet.appendChild(headerImg);

      var body = document.createElement("div");
      body.className = "a4-body";
      var bodyHtml = "";
      if(pg.isFirst) bodyHtml += titleHtml;
      pg.items.forEach(function(i){ bodyHtml += itemHtmls[i]; });
      body.innerHTML = bodyHtml;
      sheet.appendChild(body);

      var footerImg = document.createElement("img");
      footerImg.className = "a4-footer";
      footerImg.src = footerSrc;
      footerImg.alt = "";
      sheet.appendChild(footerImg);

      container.appendChild(sheet);
    });

    return pages.length;
  }

  // ---------- SALVA SCHEDA ----------
  // Genera un file HTML autonomo della scheda corrente (carta intestata +
  // elenco esercizi) e lo salva nella cartella Schede_Salvate.
  //
  // Le foto degli esercizi vengono incorporate come immagini base64 lette da
  // img_data.js (generato una volta a partire dalla cartella img/). Questo
  // evita del tutto il trucco "canvas + toDataURL", che sotto file:// viene
  // quasi sempre bloccato dal browser ("tainted canvas") e produceva schede
  // salvate con le immagini mancanti. img_data.js viene caricato solo al
  // primo salvataggio (e' un file pesante, ~20MB) tramite un tag <script>,
  // lo stesso meccanismo gia' usato per data.js, che sotto file:// funziona
  // sempre (a differenza di fetch()).

  function slugify(s){
    s = (s || "").normalize("NFKD").replace(/[̀-ͯ]/g, "");
    s = s.replace(/[^a-zA-Z0-9]+/g, "_").replace(/^_+|_+$/g, "");
    return s || "senza_nome";
  }

  // IMG_DATA e' dichiarato con "const" nel file caricato dinamicamente: questo
  // crea un binding globale accessibile per nome (come EXERCISES da data.js),
  // ma NON una proprieta' di "window" -- per questo va letto con "typeof",
  // non con window.IMG_DATA (che resterebbe sempre undefined).
  function getImgData(){
    try{ return typeof IMG_DATA !== "undefined" ? IMG_DATA : null; }catch(e){ return null; }
  }

  var imgDataLoadPromise = null;
  function ensureImgDataLoaded(){
    if(getImgData()) return Promise.resolve(true);
    if(imgDataLoadPromise) return imgDataLoadPromise;
    imgDataLoadPromise = new Promise(function(resolve){
      var done = false;
      var finish = function(ok){
        if(done) return;
        done = true;
        resolve(ok);
      };
      var script = document.createElement("script");
      script.src = "img_data.js";
      script.onload = function(){ finish(!!getImgData()); };
      script.onerror = function(){ finish(false); };
      document.head.appendChild(script);
      // Rete di sicurezza: file da ~20MB, su disco lento potrebbe richiedere
      // qualche secondo. Non blocchiamo il salvataggio all'infinito.
      setTimeout(function(){ finish(!!getImgData()); }, 15000);
    });
    return imgDataLoadPromise;
  }

  // Il file HTML autonomo generato qui riusa la stessa logica di impaginazione
  // A4 dell'app (buildA4Sheets) incorporandola come script inline: cosi',
  // quando lo si apre, si ricompone da solo in fogli 21x29.7cm -- stesso
  // formato dell'anteprima e della stampa, sia a schermo che stampandolo.
  async function buildStandaloneSchedaHTML(){
    var headerSrc = lhHeaderSrc();
    var footerSrc = lhFooterSrc();
    var paziente = fPaziente.value || "";
    var dataVal = fData.value || new Date().toLocaleDateString("it-IT");
    var note = fNote.value || "";
    var ids = Array.from(state.selected);

    var haveImgData = await ensureImgDataLoaded();
    var imgData = getImgData();

    var items = [];
    for(var i=0;i<ids.length;i++){
      var ex = byId[ids[i]];
      if(!ex) continue;
      var imgSrc = "";
      if(ex.img){
        var b64 = haveImgData && imgData ? imgData[String(ex.id)] : null;
        imgSrc = b64 || ("../" + ex.img); // fallback: percorso relativo, valido solo dentro Schede_Salvate
      }
      items.push({imgSrc: imgSrc, nome: ex.nome, quantita: ex.quantita, descrizione: ex.descrizione});
    }

    var title = "Scheda esercizi" + (paziente ? " - " + paziente : "") + " - " + dataVal;
    var dataJson = JSON.stringify({
      headerSrc: headerSrc, footerSrc: footerSrc,
      paziente: paziente, dataVal: dataVal, note: note, items: items
    });

    return '<!DOCTYPE html>\n<html lang="it"><head><meta charset="UTF-8"><title>' + escapeHtml(title) + '</title>' +
      '<style>' +
      'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;background:#eef1ef;padding:24px;color:#1f2933;}' +
      '#pages{display:flex;flex-direction:column;align-items:center;}' +
      '.a4-sheet{width:21cm;height:29.7cm;box-sizing:border-box;padding:1cm 2cm 1cm 2cm;margin:0 0 24px;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,.28);display:flex;flex-direction:column;overflow:hidden;}' +
      '.a4-sheet .a4-header{flex-shrink:0;width:100%;display:block;margin-bottom:0.5cm;}' +
      '.a4-sheet .a4-footer{flex-shrink:0;width:100%;display:block;margin-top:0.5cm;}' +
      '.a4-sheet .a4-body{flex:1 1 auto;overflow:hidden;}' +
      '.print-head{border-bottom:2px solid #0f6a37;padding-bottom:10px;margin-bottom:16px;}' +
      '.print-head h1{font-size:19px;margin:0 0 6px;color:#0a4d28;}' +
      '.print-meta{font-size:13px;color:#333;display:flex;gap:22px;}' +
      '.print-note{margin-top:8px;font-size:12.5px;color:#333;white-space:pre-line;}' +
      '.print-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #ddd;break-inside:avoid;}' +
      '.print-item img{max-width:110px;max-height:110px;width:auto;height:auto;border-radius:6px;flex-shrink:0;display:block;align-self:flex-start;}' +
      '.print-item h4{margin:0 0 4px;font-size:14px;}' +
      '.print-item .pq{font-size:12px;font-weight:700;color:#0a4d28;margin-bottom:3px;}' +
      '.print-item p{margin:0;font-size:12px;color:#333;line-height:1.4;}' +
      '.print-item .pnotes{margin-top:6px;font-size:11.5px;color:#888;border-top:1px dashed #ccc;padding-top:4px;}' +
      '@page{size:A4;margin:0;}' +
      '@media print{' +
        'body{background:#fff;padding:0;}' +
        '#pages{display:block;}' +
        '.a4-sheet{box-shadow:none;margin:0;break-after:page;page-break-after:always;}' +
        '.a4-sheet:last-child{break-after:auto;page-break-after:auto;}' +
      '}' +
      '</style></head><body>' +
      '<div id="pages"></div>' +
      '<script>' +
      'var D = ' + dataJson + ';' +
      'function escapeHtml(s){s=(s==null?"":String(s));var d=document.createElement("div");d.textContent=s;return d.innerHTML;}' +
      'var _cmPx=null;' +
      'function cmToPx(cm){if(_cmPx===null){var p=document.createElement("div");p.style.cssText="position:absolute;visibility:hidden;height:0;width:100cm;";document.body.appendChild(p);_cmPx=p.getBoundingClientRect().width/100;document.body.removeChild(p);if(!_cmPx)_cmPx=37.7952755906;}return cm*_cmPx;}' +
      'function buildItemHtml(imgSrc,nome,quantita,descrizione){return \'<div class="print-item">\'+(imgSrc?\'<img src="\'+escapeHtml(imgSrc)+\'" alt="">\':"")+\'<div><h4>\'+escapeHtml(nome)+\'</h4>\'+(quantita?\'<div class="pq">\'+escapeHtml(quantita)+\'</div>\':"")+\'<p>\'+escapeHtml(descrizione||"")+\'</p>\'+\'<div class="pnotes">Note: ______________________________________________</div>\'+\'</div></div>\';}' +
      'function buildTitleHtml(paziente,dataVal,note){return \'<div class="print-head"><h1>Scheda esercizi</h1><div class="print-meta">\'+(paziente?\'<span>Paziente: \'+escapeHtml(paziente)+\'</span>\':"")+\'<span>Data: \'+escapeHtml(dataVal)+\'</span></div>\'+(note?\'<div class="print-note">\'+escapeHtml(note)+\'</div>\':"")+\'</div>\';}' +
      'function buildA4Sheets(container,headerSrc,footerSrc,paziente,dataVal,note,items){' +
        'container.innerHTML="";' +
        'var contentWCm=21-2*2;var contentWPx=cmToPx(contentWCm);' +
        'var pageInnerHPx=cmToPx(29.7-2*1);' +
        'var headerHPx=cmToPx(contentWCm*0.0959)+cmToPx(0.5);' +
        'var footerHPx=cmToPx(contentWCm*0.0690)+cmToPx(0.5);' +

          'current.push(i);used+=h;}' +
        'pages.push({items:current,isFirst:isFirstPage});' +
        'pages.forEach(function(pg){' +
          'var sheet=document.createElement("div");sheet.className="a4-sheet";' +

          'var body=document.createElement("div");body.className="a4-body";' +

          'var fi=document.createElement("img");fi.className="a4-footer";fi.src=footerSrc;fi.alt="";sheet.appendChild(fi);' +

  }

  var saveInProgress = false;
  document.getElementById("saveSchedaBtn").onclick = async function(){
    if(saveInProgress) return;
    if(state.selected.size===0){
      alert("La scheda e' vuota: aggiungi almeno un esercizio prima di salvare.");
      return;
    }
    var statusEl = document.getElementById("saveStatus");
    var btn = document.getElementById("saveSchedaBtn");
    saveInProgress = true;
    btn.disabled = true;
    statusEl.textContent = "Preparazione del file...";
    try{
      var html = await buildStandaloneSchedaHTML();
      var paziente = fPaziente.value || "";
      var dataSlug = slugify(fData.value || new Date().toLocaleDateString("it-IT"));
      var filename = "Scheda_" + slugify(paziente) + "_" + dataSlug + ".html";

      if(window.showSaveFilePicker){
        try{
          var handle = await window.showSaveFilePicker({
            suggestedName: filename,
            types: [{description: "Pagina HTML", accept: {"text/html": [".html"]}}]
          });
          var writable = await handle.createWritable();
          await writable.write(html);
          await writable.close();
          statusEl.textContent = "Scheda salvata: " + filename;
          flashSaved("Scheda salvata.");
        }catch(err){
          if(err && err.name === "AbortError"){
            statusEl.textContent = "";
          } else {
            downloadFallback(html, filename);
            statusEl.textContent = "Scheda scaricata: " + filename;
          }
        }
      } else {
        downloadFallback(html, filename);
        statusEl.textContent = "Scheda scaricata: " + filename;
        alert('Il browser non permette di scegliere la cartella di salvataggio: la scheda "' + filename + '" e\' stata scaricata nella cartella Download del browser. Spostala dentro "Raccolta_Esercizi_Interattiva/Schede_Salvate" per tenerla insieme alle altre.');
      }
    }catch(e){
      statusEl.textContent = "";
      alert("Non sono riuscito a salvare la scheda: " + (e && e.message ? e.message : e));
    }finally{
      saveInProgress = false;
      btn.disabled = false;
      setTimeout(function(){ statusEl.textContent = ""; }, 5000);
    }
  };

  // ---------- CONDIVIDI LINK ----------
  // La scheda viene codificata come JSON compatto (id esercizi + paziente/
  // data/note) in base64 nel parametro ?scheda= dell'URL. Non servono le
  // immagini: chi apre il link ha gia' l'intero database esercizi nell'app
  // (data.js), quindi il link resta piccolo e funziona anche via SMS/chat.
  // Chi lo apre la prima volta ha bisogno di una connessione (per scaricare
  // l'app se non l'ha mai visitata); da li' in poi, grazie al service
  // worker, anche i link aperti restano disponibili offline.
  function encodeSchedaToParam(){
    var payload = {
      v: 1,
      ids: Array.from(state.selected),
      paziente: fPaziente.value || "",
      dataVal: fData.value || "",
      note: fNote.value || ""
    };
    var json = JSON.stringify(payload);
    var b64 = btoa(unescape(encodeURIComponent(json)));
    // base64 URL-safe
    return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function decodeSchedaFromParam(param){
    try{
      var b64 = param.replace(/-/g, "+").replace(/_/g, "/");
      while(b64.length % 4) b64 += "=";
      var json = decodeURIComponent(escape(atob(b64)));
      var payload = JSON.parse(json);
      if(!payload || !Array.isArray(payload.ids)) return null;
      return payload;
    }catch(e){ return null; }
  }

  document.getElementById("shareLinkBtn").onclick = async function(){
    if(state.selected.size===0){
      alert("La scheda e' vuota: aggiungi almeno un esercizio prima di condividere.");
      return;
    }
    var param = encodeSchedaToParam();
    var url = location.origin + location.pathname + "?scheda=" + param;
    var statusEl = document.getElementById("saveStatus");
    try{
      if(navigator.share){
        await navigator.share({title:"Scheda esercizi", url: url});
        return;
      }
    }catch(e){ /* utente ha annullato la condivisione: continua sotto */ }
    try{
      await navigator.clipboard.writeText(url);
      statusEl.textContent = "Link copiato negli appunti.";
    }catch(e){
      window.prompt("Copia questo link per condividere la scheda:", url);
    }
    setTimeout(function(){ statusEl.textContent=""; }, 4000);
  };

  function applySchedaFromPayload(payload){
    var validIds = payload.ids.filter(function(id){ return !!byId[id]; });
    if(validIds.length===0){
      alert("Il link non contiene esercizi validi per questo database.");
      return;
    }
    state.selected = new Set(validIds);
    saveSelected();
    if(payload.paziente) fPaziente.value = payload.paziente;
    if(payload.dataVal) fData.value = payload.dataVal;
    if(payload.note) fNote.value = payload.note;
    saveField("raccolta_esercizi_paziente", fPaziente.value);
    saveField("raccolta_esercizi_data", fData.value);
    saveField("raccolta_esercizi_note", fNote.value);
    render();
    document.getElementById("drawerOverlay").classList.add("open");
    document.getElementById("drawer").classList.add("open");
  }

  function checkSchedaLinkOnLoad(){
    var params = new URLSearchParams(location.search);
    var param = params.get("scheda");
    if(!param) return;
    var payload = decodeSchedaFromParam(param);
    if(!payload){
      alert("Il link condiviso non e' valido o e' danneggiato.");
      return;
    }
    var n = payload.ids.length;
    var msg = "E' stato aperto un link con una scheda condivisa (" + n +
      " esercizi" + (payload.paziente ? ", paziente: " + payload.paziente : "") +
      "). Vuoi caricarla, sostituendo la scheda attuale?";
    if(window.confirm(msg)){
      applySchedaFromPayload(payload);
    }
    // ripulisce l'URL per evitare di richiedere di nuovo al refresh
    var cleanUrl = location.origin + location.pathname;
    history.replaceState(null, "", cleanUrl);
  }

  function downloadFallback(html, filename){
    var blob = new Blob([html], {type:"text/html"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  }

  // ---------- SEARCH ----------
  var searchInput = document.getElementById("searchInput");
  var searchTimer = null;
  searchInput.addEventListener("input", function(){
    clearTimeout(searchTimer);
    var v = searchInput.value;
    searchTimer = setTimeout(function(){
      state.query = v;
      renderGrid();
    }, 120);
  });

  // ---------- RENDER ----------
  function render(){
    renderTree();
    renderGrid();
    updateSchedaCount();
  }

  render();
  checkSchedaLinkOnLoad();
})();
</script>
